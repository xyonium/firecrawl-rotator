services:
  api-key-rotator:
    build: .
    # or: image: ghcr.io/<you>/api-key-rotator:latest
    environment:
      FIRECRAWL_API_KEYS: "fc-key1,fc-key2,fc-key3"
      UPSTREAM: "https://api.firecrawl.dev"
      PORT: "8788"
      MAX_PASSES: "2"
      MAX_BODY_BYTES: "16777216"
      CREDIT_RESET_DAY: "1"
      LOW_CREDIT_THRESHOLD: "10"
      STOP_CREDIT_THRESHOLD: "2"
      CREDIT_REFRESH_INTERVAL: "300"
      LOG_LEVEL: "info"
      # UPSTREAM_PROXY: "http://corp-proxy:3128"   # optional egress proxy
      # TAVILY_API_KEYS: "tvly-key1,tvly-key2"     # optional tavily profile
      # TAVILY_UPSTREAM: "https://api.tavily.com"
      # TAVILY_ROUTE_PREFIX: "/tavily"
    ports:
      - "8788:8788"
    healthcheck:
      test: ["CMD", "/api-key-rotator", "-healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  firecrawl:
    image: ghcr.io/open-webui/mcpo:latest
    entrypoint: ["uvx", "mcpo"]
    command: ["--host", "0.0.0.0", "--port", "8000", "--config", "/config/config.json"]
    volumes:
      - ./config:/config:ro
    depends_on:
      api-key-rotator:
        condition: service_healthy
    environment:
      # mcpo's config.json sets FIRECRAWL_API_URL per MCP server; shown here
      # for clarity. The key is REMOVED - the rotator injects it.
      FIRECRAWL_API_URL: "http://api-key-rotator:8788"
    restart: unless-stopped
